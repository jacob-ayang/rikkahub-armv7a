name: ARMv7 ABI Sanity (Temporary)

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "app/src/main/jniLibs/**"
      - "app/src/main/java/me/rerere/rikkahub/di/DataSourceModule.kt"
      - "app/src/main/java/me/rerere/rikkahub/data/db/fts/MessageFtsManager.kt"
      - ".github/workflows/release.yml"
      - ".github/workflows/armv7-abi-sanity.yml"
      - "docs/native/libsimple.md"

jobs:
  static-abi-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify libsimple files exist
        run: |
          set -euo pipefail
          REQUIRED_LIBS=(
            "app/src/main/jniLibs/arm64-v8a/libsimple.so"
            "app/src/main/jniLibs/x86_64/libsimple.so"
            "app/src/main/jniLibs/armeabi-v7a/libsimple.so"
          )
          for so_path in "${REQUIRED_LIBS[@]}"; do
            if [ ! -f "$so_path" ]; then
              echo "ERROR: Missing required library: $so_path"
              exit 1
            fi
          done

      - name: Verify armv7 ELF architecture
        run: |
          set -euo pipefail
          mkdir -p build-output
          readelf -h app/src/main/jniLibs/armeabi-v7a/libsimple.so | tee build-output/readelf-armv7-source.txt
          grep -q "Class:.*ELF32" build-output/readelf-armv7-source.txt
          grep -q "Machine:.*ARM" build-output/readelf-armv7-source.txt

      - name: Verify required exported symbols
        run: |
          set -euo pipefail
          nm -D app/src/main/jniLibs/armeabi-v7a/libsimple.so > build-output/nm-armv7-source.txt
          grep -q "sqlite3_simple_init" build-output/nm-armv7-source.txt
          grep -q "fts5_simple_xCreate" build-output/nm-armv7-source.txt

      - name: Verify SHA documented in docs/native/libsimple.md
        run: |
          set -euo pipefail
          SHA="$(sha256sum app/src/main/jniLibs/armeabi-v7a/libsimple.so | awk '{print $1}')"
          if ! grep -q "$SHA" docs/native/libsimple.md; then
            echo "ERROR: SHA $SHA not found in docs/native/libsimple.md"
            exit 1
          fi
          echo "$SHA" > build-output/armv7-sha256.txt

      - name: Upload static check artifacts
        uses: actions/upload-artifact@v4
        with:
          name: armv7-abi-static-${{ github.run_id }}
          path: build-output/*
          if-no-files-found: error

  armv7-apk-packaging-check:
    runs-on: ubuntu-latest
    needs: static-abi-check
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 36
          ndk-version: 27.0.11902837

      - name: Prepare google-services.json
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.GOOGLE_SERVICES_JSON_B64 }}" ]; then
            echo "ERROR: Missing secret GOOGLE_SERVICES_JSON_B64"
            exit 1
          fi
          printf '%s' "${{ secrets.GOOGLE_SERVICES_JSON_B64 }}" | base64 -d > app/google-services.json

      - name: Build armv7 debug APK
        run: |
          set -euo pipefail
          chmod +x gradlew
          ./gradlew clean assembleArmv7Debug --stacktrace

      - name: Verify APK contains armv7 libsimple.so
        run: |
          set -euo pipefail
          mkdir -p build-output

          ARMV7_APK="$(find app/build/outputs/apk -type f -name '*armv7*debug*.apk' | head -1)"
          if [ -z "$ARMV7_APK" ]; then
            echo "ERROR: armv7 debug APK not found."
            find app/build/outputs/apk -type f -name '*.apk' || true
            exit 1
          fi

          cp "$ARMV7_APK" build-output/rikkahub-armv7-debug.apk

          if ! unzip -l "$ARMV7_APK" | grep -q "lib/armeabi-v7a/libsimple.so"; then
            echo "ERROR: APK missing lib/armeabi-v7a/libsimple.so"
            unzip -l "$ARMV7_APK" | grep "lib/armeabi-v7a/" || true
            exit 1
          fi

      - name: Verify extracted APK so architecture
        run: |
          set -euo pipefail
          TMP_DIR="$(mktemp -d)"
          unzip -p build-output/rikkahub-armv7-debug.apk lib/armeabi-v7a/libsimple.so > "$TMP_DIR/libsimple.so"
          readelf -h "$TMP_DIR/libsimple.so" | tee build-output/readelf-armv7-from-apk.txt
          grep -q "Class:.*ELF32" build-output/readelf-armv7-from-apk.txt
          grep -q "Machine:.*ARM" build-output/readelf-armv7-from-apk.txt

      - name: Upload packaging check artifacts
        uses: actions/upload-artifact@v4
        with:
          name: armv7-abi-packaging-${{ github.run_id }}
          path: build-output/*
          if-no-files-found: error

      - name: Cleanup secrets
        if: always()
        run: rm -f app/google-services.json
